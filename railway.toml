[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm install -g prisma@5.22.0 @prisma/client@5.22.0 && cd packages/database && npx prisma generate && cd ../.. && npm run build --workspace=packages/shared || true && npm run build --workspace=apps/api"

[deploy]
startCommand = "node apps/api/dist/apps/api/src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[build]
builder = "NIXPACKS"
# Force rebuild: 2026-03-19
buildCommand = "npm install --include=dev && npm install -g prisma@5.22.0 && rm -rf apps/api/node_modules/.prisma apps/api/node_modules/@prisma/client packages/database/node_modules/.prisma packages/database/node_modules/@prisma/client && cd packages/database && prisma generate && cd ../.. && npm run build --workspace=packages/shared || true && npm run build --workspace=apps/api"

[deploy]
startCommand = "echo '=== Running migrations ===' && npx prisma migrate deploy --schema=packages/database/prisma/schema.prisma && echo '=== Starting application ===' && node apps/api/dist/apps/api/src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

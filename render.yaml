services:
  - type: web
    name: gymiq-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: |
      npm install
      rm -rf apps/api/node_modules/.prisma apps/api/node_modules/@prisma/client
      cd packages/database && npx prisma generate && cd ../..
      npm run build --workspace=packages/shared || true
      npm run build --workspace=apps/api
    startCommand: |
      cd packages/database && npx prisma migrate deploy && cd ../.. && node apps/api/dist/apps/api/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: gymiq-db
          property: connectionString
      - fromGroup: gymiq-secrets

databases:
  - name: gymiq-db
    plan: free
    databaseName: gymiq
    user: gymiq

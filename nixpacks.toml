[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = [
  "npm install --include=dev"
]

[phases.build]
cmds = [
  "cd packages/database && npx prisma generate",
  "npm run build --workspace=packages/shared || true",
  "npm run build --workspace=packages/connectors || true",
  "npm run build --workspace=packages/ai-gateway || true",
  "npm run build --workspace=apps/api"
]

[start]
cmd = "cd packages/database && npx prisma migrate deploy && cd ../.. && node apps/api/dist/apps/api/src/index.js"
